<!doctype html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — To Do List</title>
  <link rel="stylesheet" href="/static/src/output.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-fade-in {
      animation: fadeIn 0.7s ease-out;
    }
  </style>
</head>
<body class="min-h-screen bg-gray-900 text-white flex flex-col justify-center px-6 py-12">

  <!-- Splash Screen -->
  <div id="splash" class="fixed inset-0 bg-gray-900 flex flex-col justify-center items-center z-50 transition-opacity duration-500 ease-in-out">
    <img src="/static/img/icon.png" class="h-24 w-24 mb-4">
    <h1 class="text-4xl font-extrabold text-white">CHECKO<span class="text-indigo-500">.</span></h1>
    <p class="text-indigo-400 font-semibold text-xs tracking-widest uppercase">Jalani Harimu Dengan Lebih Terencana</p>
  </div>

  <div id="main-content" class="hidden scale-95 transition-all duration-700 ease-out">
    <div class="flex justify-center">
      <img src="/static/img/icon.png" class="h-24 w-24">
    </div>
    
    <h1 class="text-center text-4xl font-extrabold text-white">CHECKO<span class="text-indigo-500">.</span></h1>
    <p class="text-center text-indigo-400 font-semibold text-xs tracking-widest uppercase mb-2">Jalani Harimu Dengan Lebih Terencana</p>
    <h2 class="mt-6 text-center text-sm font-medium text-gray-400">Masuk ke akun kamu</h2>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-sm">
    <div id="alert" class="hidden mb-5 rounded-lg px-4 py-3 text-sm font-medium border"></div>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1.5">Email</label>
        <input id="email" type="email" autocomplete="email" placeholder="contoh@email.com"
          class="block w-full rounded-lg bg-white/5 border border-white/10 px-3.5 py-2.5 text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
        <div class="relative">
          <input id="password" type="password" autocomplete="current-password" placeholder="Min. 6 karakter"
            class="block w-full rounded-lg bg-white/5 border border-white/10 px-3.5 py-2.5 pr-11 text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition"/>
          <button type="button" onclick="togglePw()" class="absolute inset-y-0 right-3 text-gray-500 hover:text-gray-300 transition">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
      </div>
      <button id="btn-login" onclick="doLogin()"
        class="w-full flex justify-center rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed transition mt-2">
        Masuk
      </button>
    </div>

    <p class="mt-8 text-center text-sm text-gray-500">
      Belum punya akun?
      <a href="/register.html" class="font-semibold text-indigo-400 hover:text-indigo-300 transition">Daftar sekarang</a>
    </p>
  </div>
</div>

  <script>
    if (localStorage.getItem('token')) location.href = '/dashboard.html';

    function togglePw() {
      const el = document.getElementById('password');
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    function showAlert(msg, type='error') {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = 'mb-5 rounded-lg px-4 py-3 text-sm font-medium border ' +
        (type==='error' ? 'bg-red-950 text-red-300 border-red-800' : 'bg-green-950 text-green-300 border-green-800');
      el.classList.remove('hidden');
    }

    async function doLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('btn-login');
      if (!email || !password) { showAlert('Email dan password wajib diisi.'); return; }
      btn.disabled = true; btn.textContent = 'Memproses...';
      try {
        const res  = await fetch('/api/auth/login', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) { showAlert(data.message || 'Email atau password salah.'); return; }
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showAlert('Login berhasil! Mengalihkan...', 'success');
        setTimeout(() => location.href = '/dashboard.html', 700);
      } catch { showAlert('Tidak dapat terhubung ke server.'); }
      finally { btn.disabled=false; btn.textContent='Masuk'; }
    }

    document.addEventListener('DOMContentLoaded', () => {
      ['email','password'].forEach(id =>
        document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); })
      );
    });
    // Splash screen transition
    window.onload = function() {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        splash.classList.add('opacity-0');
        setTimeout(() => {
          splash.style.display = 'none';
          const mainContent = document.getElementById('main-content');
          mainContent.classList.remove('hidden');
          mainContent.classList.add('animate-fade-in');
        }, 500);
      }, 2000);
    };  </script>
</body>
</html>
